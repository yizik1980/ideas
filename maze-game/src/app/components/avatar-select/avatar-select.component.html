<div class="select-screen" dir="rtl">
  <h1 class="title">🌀 מבוך הידע</h1>
  <p class="subtitle">בחר אווטר, הכנס שם ובחר רמת קושי</p>

  <section class="section">
    <h2>בחר אווטר</h2>
    <div class="avatar-grid">
      @for (a of avatars; track a.id) {
        <button
          class="avatar-btn"
          [class.selected]="selectedAvatar.id === a.id"
          (click)="selectAvatar(a)"
          type="button"
        >
          <span class="avatar-emoji">{{ a.emoji }}</span>
          <span class="avatar-label">{{ a.label }}</span>
        </button>
      }
    </div>
  </section>

  <section class="section">
    <h2>שם השחקן</h2>
    <input
      class="name-input"
      type="text"
      [(ngModel)]="playerName"
      placeholder="הכנס שם..."
      maxlength="20"
    />
    @if (savedNames.length > 0) {
      <div class="saved-names">
        @for (name of savedNames; track name) {
          <button class="saved-name-btn" (click)="selectSavedName(name)" type="button">
            {{ name }}
          </button>
        }
      </div>
    }
  </section>

  <section class="section">
    <h2>רמת קושי</h2>
    <div class="difficulty-grid">
      @for (d of difficulties; track d.value) {
        <label class="diff-btn" [class.selected]="difficulty === d.value">
          <input type="radio" name="difficulty" [value]="d.value" [(ngModel)]="difficulty" />
          {{ d.label }}
        </label>
      }
    </div>
  </section>
  <section>
    <label class="single-step-label">
      <input type="checkbox" [(ngModel)]="singleStep" />
      <span class="single-step-text">מצב קליל של מסך אחד</span>
    </label>
  </section>
  <section class="section">
    <h2>נושא שאלות</h2>
    <div class="category-grid">
      @for (c of categories; track c.value) {
        <label class="cat-btn" [class.selected]="category === c.value">
          <input
            type="radio"
            name="category"
            [value]="c.value"
            [(ngModel)]="category"
          />
          <span class="cat-emoji">{{ c.emoji }}</span>
          {{ c.label }}
        </label>
      }
    </div>
  </section>

  <button class="start-btn" [disabled]="!playerName.trim()" (click)="startGame()" type="button">
    התחל משחק 🚀
  </button>
</div>
